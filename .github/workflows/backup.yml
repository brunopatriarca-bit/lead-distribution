name: Backup Neon DB

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar PostgreSQL 17 client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl ca-certificates
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          sudo sh -c 'echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client-17

      - name: Executar pg_dump
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          DATE=$(date +%Y-%m-%d_%H-%M)
          mkdir -p backups
          pg_dump "$DATABASE_URL" \
            --no-owner \
            --no-acl \
            --format=plain \
            --file="backups/backup_${DATE}.sql"
          gzip "backups/backup_${DATE}.sql"
          echo "Backup criado: backups/backup_${DATE}.sql.gz"
          ls -lh backups/

      - name: Remover backups com mais de 30 dias
        run: find backups/ -name "*.sql.gz" -mtime +30 -delete || true

      - name: Commit e push
        run: |
          git config user.name "backup-bot"
          git config user.email "backup@lead-distribution"
          git add backups/
          git diff --staged --quiet || git commit -m "backup: $(date +%d/%m/%Y)"
          git push origin main
